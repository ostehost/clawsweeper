name: maintainer report to discord

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch and summarize without posting to Discord"
        required: true
        default: false
        type: boolean
      date:
        description: "Optional YYYY-MM-DD daily report key"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "37 9 * * *"

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093
  REPORTS_PUBLIC_BASE_URL: https://reports.openclaw.ai/

concurrency:
  group: openclaw-maintainer-report-discord
  cancel-in-progress: false

jobs:
  notify:
    name: Summarize maintainer report
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Create maintainer repo token
        id: maintainers_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: maintainers
          permission-contents: read

      - uses: actions/checkout@v7
        with:
          filter: blob:none
          persist-credentials: false

      - uses: actions/checkout@v7
        with:
          repository: openclaw/maintainers
          path: maintainers
          token: ${{ steps.maintainers_token.outputs.token }}
          filter: blob:none
          persist-credentials: false

      - name: Create notification ledger state token
        id: notification-state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.notification-state-token.outputs.token }}

      - uses: ./.github/actions/setup-action-ledger

      - uses: ./.github/actions/setup-pnpm
        id: setup-pnpm
        with:
          build-script: build:repair

      - name: Post report summary
        env:
          CLAWSWEEPER_OPENCLAW_HOOK_URL: ${{ secrets.CLAWSWEEPER_OPENCLAW_HOOK_URL }}
          CLAWSWEEPER_OPENCLAW_HOOK_TOKEN: ${{ secrets.CLAWSWEEPER_OPENCLAW_HOOK_TOKEN }}
          CLAWSWEEPER_OPENCLAW_AGENT_ID: ${{ vars.CLAWSWEEPER_OPENCLAW_AGENT_ID || 'clawsweeper' }}
          CLAWSWEEPER_DISCORD_TARGET: ${{ vars.CLAWSWEEPER_DISCORD_TARGET || 'channel:1456744319972282449' }}
          REPORTS_BASE_URL: file://${{ github.workspace }}/maintainers/reports/
          REPORTS_ACCESS_CLIENT_ID: ${{ secrets.OPENCLAW_REPORTS_ACCESS_CLIENT_ID || secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
          REPORTS_ACCESS_CLIENT_SECRET: ${{ secrets.OPENCLAW_REPORTS_ACCESS_CLIENT_SECRET || secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
          CLAWSWEEPER_MAINTAINER_REPORT_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.date || '' }}
          CLAWSWEEPER_MAINTAINER_REPORT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '1' || '0' }}
          CLAWSWEEPER_MAINTAINER_REPORT_STRICT: "1"
          CLAWSWEEPER_MAINTAINER_REPORT_DELIVER: "1"
        run: pnpm run repair:notify-maintainer-report -- --write-report

      - name: Finalize maintainer notification action ledger
        if: ${{ always() && steps.setup-pnpm.outcome == 'success' }}
        run: pnpm run --silent repair:action-ledger -- finalize

      - name: Publish immutable maintainer notification action ledger
        if: ${{ always() && steps.setup-pnpm.outcome == 'success' }}
        run: |
          set -euo pipefail
          source_root=".clawsweeper-repair/action-ledger-state"
          if [ ! -d "$source_root/ledger" ]; then
            exit 0
          fi
          paths_file=".artifacts/maintainer-notification-action-ledger-paths.txt"
          mkdir -p .artifacts
          pnpm run --silent repair:action-ledger -- publish \
            --source-root "$source_root" \
            --state-root "$CLAWSWEEPER_STATE_DIR" |
            jq -r '.paths[]?' |
            sort -u > "$paths_file"
          action_ledger_args=()
          while IFS= read -r event_path; do
            durable_event_path="$CLAWSWEEPER_STATE_DIR/$event_path"
            test -f "$durable_event_path"
            mkdir -p "$(dirname "$event_path")"
            cp "$durable_event_path" "$event_path"
            action_ledger_args+=(--path "$event_path")
          done < "$paths_file"
          if [ "${#action_ledger_args[@]}" -gt 0 ]; then
            pnpm run repair:publish-main -- \
              --message "chore: append maintainer notification action ledger" \
              "${action_ledger_args[@]}"
          fi
