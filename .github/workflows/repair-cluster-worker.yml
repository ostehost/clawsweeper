name: repair cluster worker

run-name: ${{ inputs.job_sha256 && (inputs.dispatch_key && format('{0} [{1}] ({2})', contains(inputs.job, '/inbox/issue-') && format('issue implementation {0}', inputs.job) || contains(inputs.job, '/inbox/automerge-') && format('automerge repair {0}', inputs.job) || format('repair cluster {0}', inputs.job), inputs.dispatch_key, inputs.job_sha256) || format('{0} ({1})', contains(inputs.job, '/inbox/issue-') && format('issue implementation {0}', inputs.job) || contains(inputs.job, '/inbox/automerge-') && format('automerge repair {0}', inputs.job) || format('repair cluster {0}', inputs.job), inputs.job_sha256)) || (inputs.dispatch_key && format('{0} [{1}]', contains(inputs.job, '/inbox/issue-') && format('issue implementation {0}', inputs.job) || contains(inputs.job, '/inbox/automerge-') && format('automerge repair {0}', inputs.job) || format('repair cluster {0}', inputs.job), inputs.dispatch_key) || contains(inputs.job, '/inbox/issue-') && format('issue implementation {0}', inputs.job) || contains(inputs.job, '/inbox/automerge-') && format('automerge repair {0}', inputs.job) || format('repair cluster {0}', inputs.job)) }}

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Job markdown path, for example jobs/openclaw/inbox/cluster-001.md"
        required: true
        type: string
      dispatch_key:
        description: "Optional command-router idempotency key"
        required: false
        default: ""
        type: string
      payload_version:
        description: "Dispatch payload contract; new producers send 2"
        required: false
        default: ""
        type: string
      state_revision:
        description: "Immutable clawsweeper-state commit containing the exact job"
        required: false
        default: ""
        type: string
      job_sha256:
        description: "SHA-256 of the exact immutable job bytes"
        required: false
        default: ""
        type: string
      mode:
        description: "Worker mode"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - execute
          - autonomous
      runner:
        description: "Deprecated compatibility value; planning uses a fixed trusted runner"
        required: true
        default: blacksmith-4vcpu-ubuntu-2404
        type: string
      execution_runner:
        description: "Deprecated compatibility value; execution uses a fixed trusted runner"
        required: true
        default: blacksmith-16vcpu-ubuntu-2404
        type: string
      model:
        description: "Deprecated compatibility value; the workflow uses its fixed internal model"
        required: true
        default: internal
        type: string
      dry_run:
        description: "Render prompt and write a dry result without invoking Codex"
        required: true
        default: false
        type: boolean
      requeue:
        description: "Run in a dedicated lane while replacing a stale-head worker"
        required: false
        default: false
        type: boolean
      requeue_depth:
        description: "Current requeue depth carried by the prior dispatch"
        required: false
        default: "0"
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_SLUG: clawsweeper
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093
  CLAWSWEEPER_MODEL: internal

concurrency:
  group: ${{ inputs.requeue && format('clawsweeper-repair-requeue-{0}-{1}-{2}', inputs.job, inputs.job_sha256, github.run_id) || format('clawsweeper-repair-{0}', inputs.job) }}
  # Keep an active execute run alive so its temporary gate cleanup can finish;
  # queue every immutable generation instead of replacing an older pending run.
  cancel-in-progress: false
  queue: max

jobs:
  receipt:
    name: Deduplicate command dispatch receipt
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      proceed: ${{ steps.receipt.outputs.proceed }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: scripts/dispatch-receipt-owner.sh
          sparse-checkout-cone-mode: false

      - id: receipt
        env:
          DISPATCH_KEY: ${{ inputs.dispatch_key }}
          JOB_PATH: ${{ inputs.job }}
          JOB_SHA256: ${{ inputs.job_sha256 }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$DISPATCH_KEY" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$JOB_PATH" in
            */inbox/issue-*) title="issue implementation $JOB_PATH" ;;
            */inbox/automerge-*) title="automerge repair $JOB_PATH" ;;
            *) title="repair cluster $JOB_PATH" ;;
          esac
          expected_title="${title} [${DISPATCH_KEY}]"
          if [ -n "$JOB_SHA256" ]; then
            expected_title="${expected_title} (${JOB_SHA256})"
          fi
          owner="$(bash scripts/dispatch-receipt-owner.sh \
            repair-cluster-worker.yml "$expected_title" "$GITHUB_RUN_ID" "Plan and review cluster")"
          if [ "$owner" = "owner" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "An older active or successfully executed command dispatch already exists; skipping duplicate repair."
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

  cluster:
    name: Plan and review cluster
    needs: receipt
    if: ${{ needs.receipt.outputs.proceed == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 90
    permissions:
      actions: read
      contents: read
    outputs:
      allow_execute: ${{ steps.capture_gates.outputs.allow_execute }}
      allow_fix_pr: ${{ steps.capture_gates.outputs.allow_fix_pr }}
      allow_merge: ${{ steps.capture_gates.outputs.allow_merge }}
      job_exists: ${{ steps.check_job.outputs.job_exists }}
      state_revision: ${{ steps.immutable-job.outputs.state_revision }}
      job_sha256: ${{ steps.immutable-job.outputs.job_sha256 }}
      effective_mode: ${{ steps.recovery_inputs.outputs.effective_mode }}
    env:
      JOB_PATH: ${{ inputs.job }}
      WORKER_MODE: ${{ inputs.mode }}
      DRY_RUN: ${{ inputs.dry_run }}
      CLAWSWEEPER_ALLOWED_OWNER: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || 'openclaw' }}
      CLAWSWEEPER_ALLOW_EXECUTE: ${{ (inputs.mode == 'execute' || inputs.mode == 'autonomous') && vars.CLAWSWEEPER_ALLOW_EXECUTE == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_FIX_PR: ${{ (inputs.mode == 'execute' || inputs.mode == 'autonomous') && vars.CLAWSWEEPER_ALLOW_FIX_PR == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_MERGE: ${{ (inputs.mode == 'execute' || inputs.mode == 'autonomous') && (vars.CLAWSWEEPER_ALLOW_MERGE || '0') || '0' }}
      CLAWSWEEPER_HYDRATE_CLUSTER_REFS: ${{ vars.CLAWSWEEPER_HYDRATE_CLUSTER_REFS || '1' }}
      CLAWSWEEPER_HYDRATE_COMMENTS: ${{ vars.CLAWSWEEPER_HYDRATE_COMMENTS || '1' }}
      CLAWSWEEPER_MAX_COMMENTS_PER_ITEM: ${{ vars.CLAWSWEEPER_MAX_COMMENTS_PER_ITEM || '30' }}
      CLAWSWEEPER_MAX_LINKED_REFS: ${{ vars.CLAWSWEEPER_MAX_LINKED_REFS || '20' }}
      CLAWSWEEPER_MAX_REVIEW_COMMENTS_PER_PR: ${{ vars.CLAWSWEEPER_MAX_REVIEW_COMMENTS_PER_PR || '50' }}
      CLAWSWEEPER_CODEX_TIMEOUT_MS: ${{ vars.CLAWSWEEPER_CODEX_TIMEOUT_MS || '1800000' }}
      CLAWSWEEPER_CODEX_REASONING_EFFORT: ${{ vars.CLAWSWEEPER_CODEX_REASONING_EFFORT || 'high' }}
      CLAWSWEEPER_STEERABLE_CODEX: ${{ vars.CLAWSWEEPER_STEERABLE_CODEX || '0' }}
      CLAWSWEEPER_CRABFLEET_URL: ${{ vars.CLAWSWEEPER_CRABFLEET_URL || 'https://crabfleet.openclaw.ai' }}
      OPENCLAW_LOCAL_CHECK: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none
          persist-credentials: false

      - name: Validate job handoff contract
        id: job-contract
        env:
          JOB_PATH: ${{ inputs.job }}
          PAYLOAD_VERSION: ${{ inputs.payload_version }}
          STATE_REVISION: ${{ inputs.state_revision }}
          JOB_SHA256: ${{ inputs.job_sha256 }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$JOB_PATH" | grep -Eq '^jobs/[A-Za-z0-9_.-]+/inbox/[A-Za-z0-9_.-]+\.md$'; then
            echo "Invalid immutable job path: $JOB_PATH" >&2
            exit 1
          fi
          payload_version="${PAYLOAD_VERSION:-1}"
          case "$payload_version" in
            1|2) ;;
            *)
              echo "Unsupported repair payload version: $payload_version" >&2
              exit 1
              ;;
          esac
          if { [ -n "$STATE_REVISION" ] && [ -z "$JOB_SHA256" ]; } ||
             { [ -z "$STATE_REVISION" ] && [ -n "$JOB_SHA256" ]; }; then
            echo "state_revision and job_sha256 must be provided together." >&2
            exit 1
          fi
          if [ "$payload_version" = "2" ] &&
             { [ -z "$STATE_REVISION" ] || [ -z "$JOB_SHA256" ]; }; then
            echo "repair payload version 2 requires state_revision and job_sha256." >&2
            exit 1
          fi
          if [ -n "$STATE_REVISION" ]; then
            if ! printf '%s' "$STATE_REVISION" | grep -Eq '^[a-f0-9]{40}$'; then
              echo "Invalid immutable state revision: $STATE_REVISION" >&2
              exit 1
            fi
            if ! printf '%s' "$JOB_SHA256" | grep -Eq '^[a-f0-9]{64}$'; then
              echo "Invalid immutable job SHA-256: $JOB_SHA256" >&2
              exit 1
            fi
          fi
          echo "payload_version=$payload_version" >> "$GITHUB_OUTPUT"
          echo "legacy_unsealed=$([ -z "$STATE_REVISION" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-action-ledger
        id: cluster-action-ledger

      - name: Resolve target owner
        id: target
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          case "$JOB_PATH" in
            jobs/*/*) ;;
            *)
              echo "Invalid job path: $JOB_PATH" >&2
              exit 1
              ;;
          esac
          owner="${JOB_PATH#jobs/}"
          owner="${owner%%/*}"
          if ! printf '%s' "$owner" | grep -Eq '^[A-Za-z0-9_.-]+$'; then
            echo "Invalid target owner: $owner" >&2
            exit 1
          fi
          echo "target_owner=$owner" >> "$GITHUB_OUTPUT"

      - name: Create read-only state token
        id: state-read-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: clawsweeper-state
          permission-contents: read

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.state-read-token.outputs.token }}
          fetch-depth: 1
          sparse-checkout: jobs
          persist-credentials: false

      - name: Resolve immutable job handoff
        id: immutable-job
        env:
          JOB_PATH: ${{ inputs.job }}
          STATE_REVISION: ${{ inputs.state_revision }}
          JOB_SHA256: ${{ inputs.job_sha256 }}
          LEGACY_UNSEALED: ${{ steps.job-contract.outputs.legacy_unsealed }}
        run: |
          set -euo pipefail
          state_revision="$STATE_REVISION"
          job_sha256="$JOB_SHA256"
          if [ "$LEGACY_UNSEALED" = "true" ]; then
            state_revision="$(git -C "$CLAWSWEEPER_STATE_DIR" rev-parse HEAD)"
            source_path="$CLAWSWEEPER_STATE_DIR/$JOB_PATH"
            if [ ! -f "$source_path" ]; then
              echo "Legacy repair job is missing from the pinned state checkout: $JOB_PATH" >&2
              exit 1
            fi
            job_sha256="$(sha256sum "$source_path" | cut -d' ' -f1)"
            echo "::notice title=Legacy repair payload rebound::Pinned $JOB_PATH to state revision $state_revision and forced plan-only execution."
          fi
          if ! printf '%s' "$state_revision" | grep -Eq '^[a-f0-9]{40}$'; then
            echo "Invalid resolved state revision: $state_revision" >&2
            exit 1
          fi
          if ! printf '%s' "$job_sha256" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "Invalid resolved job SHA-256: $job_sha256" >&2
            exit 1
          fi
          {
            echo "state_revision=$state_revision"
            echo "job_sha256=$job_sha256"
            echo "legacy_unsealed=$LEGACY_UNSEALED"
          } >> "$GITHUB_OUTPUT"

      - name: Persist immutable recovery inputs
        id: recovery_inputs
        env:
          JOB_PATH: ${{ inputs.job }}
          STATE_REVISION: ${{ steps.immutable-job.outputs.state_revision }}
          JOB_SHA256: ${{ steps.immutable-job.outputs.job_sha256 }}
          LEGACY_UNSEALED: ${{ steps.immutable-job.outputs.legacy_unsealed }}
          REQUESTED_MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          case "$REQUESTED_MODE" in
            plan|execute|autonomous) ;;
            *)
              echo "Invalid requested repair mode: $REQUESTED_MODE" >&2
              exit 1
              ;;
          esac
          effective_mode="$REQUESTED_MODE"
          if [ "$LEGACY_UNSEALED" = "true" ] && [ "$effective_mode" != "plan" ]; then
            echo "Legacy unsealed repair payloads are restricted to plan mode."
            effective_mode="plan"
          elif [ "$effective_mode" != "plan" ] && [ "${CLAWSWEEPER_ALLOW_EXECUTE}" != "1" ]; then
            echo "CLAWSWEEPER_ALLOW_EXECUTE is not explicitly 1; persisting plan-only mode for requested $effective_mode run"
            effective_mode="plan"
          fi
          mkdir -p .clawsweeper-repair/recovery-inputs
          EFFECTIVE_MODE="$effective_mode" node <<'NODE'
          const fs = require("node:fs");
          const input = {
            schema_version: 1,
            source_job: process.env.JOB_PATH,
            state_revision: process.env.STATE_REVISION,
            job_sha256: process.env.JOB_SHA256,
            requested_mode: process.env.REQUESTED_MODE,
            effective_mode: process.env.EFFECTIVE_MODE,
          };
          fs.writeFileSync(
            ".clawsweeper-repair/recovery-inputs/workflow-inputs.json",
            `${JSON.stringify(input, null, 2)}\n`,
          );
          NODE
          echo "effective_mode=$effective_mode" >> "$GITHUB_OUTPUT"

      - name: Upload immutable recovery inputs
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-inputs-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/recovery-inputs/workflow-inputs.json
          if-no-files-found: error
          retention-days: 90

      - name: Checkout immutable state job
        uses: actions/checkout@v7
        with:
          repository: openclaw/clawsweeper-state
          ref: ${{ steps.immutable-job.outputs.state_revision }}
          path: .clawsweeper-repair/immutable-state
          token: ${{ steps.state-read-token.outputs.token }}
          fetch-depth: 1
          sparse-checkout: ${{ inputs.job }}
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Check job file
        id: check_job
        env:
          JOB_PATH: ${{ inputs.job }}
          STATE_REVISION: ${{ steps.immutable-job.outputs.state_revision }}
          JOB_SHA256: ${{ steps.immutable-job.outputs.job_sha256 }}
        run: |
          set -euo pipefail
          source_path=".clawsweeper-repair/immutable-state/$JOB_PATH"
          actual_revision="$(git -C .clawsweeper-repair/immutable-state rev-parse HEAD)"
          if [ "$actual_revision" != "$STATE_REVISION" ]; then
            echo "Immutable state revision mismatch: expected $STATE_REVISION, got $actual_revision." >&2
            exit 1
          fi
          if [ ! -f "$source_path" ]; then
            echo "Immutable job is missing at $JOB_PATH." >&2
            exit 1
          fi
          actual_sha256="$(sha256sum "$source_path" | cut -d' ' -f1)"
          if [ "$actual_sha256" != "$JOB_SHA256" ]; then
            echo "Immutable job SHA-256 mismatch: expected $JOB_SHA256, got $actual_sha256." >&2
            exit 1
          fi
          mkdir -p "$(dirname "$JOB_PATH")"
          cp "$source_path" "$JOB_PATH"
          echo "job_exists=1" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-pnpm
        id: cluster-setup-pnpm
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        with:
          build-script: build:repair

      - name: Validate job
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:validate-job -- "$JOB_PATH"

      - name: Resolve exact target repository
        id: job-target
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          EXPECTED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import { parseJob, validateJob } from "./dist/repair/lib.js";
          const job = parseJob(process.env.JOB_PATH);
          const errors = validateJob(job);
          if (errors.length > 0) throw new Error(errors.join("; "));
          const repo = String(job.frontmatter.repo || "").trim();
          if (!/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(repo)) {
            throw new Error("job target repository is invalid");
          }
          const [owner, name] = repo.split("/");
          if (owner !== process.env.EXPECTED_OWNER) {
            throw new Error("job target owner does not match the validated job path owner");
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `repo=${repo}\nowner=${owner}\nname=${name}\n`);
          NODE

      - name: Create exact-repository GitHub App token
        id: app_token
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.job-target.outputs.owner }}
          repositories: ${{ steps.job-target.outputs.name }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read

      - name: Capture execution gates
        id: capture_gates
        env:
          EFFECTIVE_MODE: ${{ steps.recovery_inputs.outputs.effective_mode }}
        run: |
          allow_execute="${CLAWSWEEPER_ALLOW_EXECUTE}"
          allow_fix_pr="${CLAWSWEEPER_ALLOW_FIX_PR}"
          allow_merge="${CLAWSWEEPER_ALLOW_MERGE}"
          if [ "$EFFECTIVE_MODE" = "plan" ]; then
            allow_execute=0
            allow_fix_pr=0
            allow_merge=0
          fi
          {
            echo "allow_execute=$allow_execute"
            echo "allow_fix_pr=$allow_fix_pr"
            echo "allow_merge=$allow_merge"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve run-scoped Codex session
        id: codex_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          key="$(printf '%s' "$JOB_PATH" | sha256sum | cut -d' ' -f1)"
          codex_home="$HOME/.clawsweeper-repair/codex-home/work-$key"
          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "codex_home=$codex_home" >> "$GITHUB_OUTPUT"
          echo "CLAWSWEEPER_CODEX_THREAD_STATE=$codex_home/clawsweeper-thread-state.json" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-codex
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAWSWEEPER_INTERNAL_MODEL: ${{ secrets.CLAWSWEEPER_MODEL }}
        with:
          codex-home: ${{ steps.codex_session.outputs.codex_home }}

      - name: Register repair lifecycle receipt
        id: lifecycle_session
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          CLAWSWEEPER_ACTION_SESSION_REMOTE: "0"
        run: pnpm run repair:action-session -- register "$JOB_PATH"

      - name: Register steerable Action session
        id: crabfleet_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' && !inputs.dry_run }}
        env:
          CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN: ${{ secrets.CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN }}
          CLAWSWEEPER_CRABFLEET_OWNER: ${{ vars.CLAWSWEEPER_CRABFLEET_OWNER }}
        run: node dist/repair/action-session.js register "$JOB_PATH" --skip-repair-receipt

      - name: Verify GitHub read token
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "GitHub App token is required"
            exit 1
          fi
          gh auth status

      - name: Verify self-heal head
        id: self_heal_head
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:conflict-self-heal -- --verify-job-head "$JOB_PATH"

      - name: Run isolated worker and stage exact ground truth
        id: stage-worker
        if: ${{ steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
          EFFECTIVE_MODE: ${{ steps.recovery_inputs.outputs.effective_mode }}
        run: |
          set -euo pipefail
          worker_mode="$EFFECTIVE_MODE"
          if [ -z "$worker_mode" ]; then
            echo "Persisted effective repair mode is missing." >&2
            exit 1
          fi
          args=("$JOB_PATH" --mode "$worker_mode")
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          principal="csww${GITHUB_RUN_ID}${GITHUB_RUN_ATTEMPT}"
          sudo --non-interactive useradd --system --no-create-home --shell /usr/sbin/nologin --user-group "$principal"
          principal_uid="$(id -u "$principal")"
          principal_gid="$(id -g "$principal")"
          runner_uid="$(id -u)"
          runner_gid="$(id -g)"
          node_real="$(realpath "$(command -v node)")"
          principal_home="$RUNNER_TEMP/clawsweeper-worker-home"
          principal_tmp="$principal_home/tmp"
          source_root="$GITHUB_WORKSPACE/.clawsweeper-repair/runs"
          stage_root="$RUNNER_TEMP/clawsweeper-worker-stage"
          test ! -e "$stage_root"
          install -d -m 0700 "$stage_root"
          sudo --non-interactive install -d -m 0700 -o "$principal_uid" -g "$principal_gid" \
            "$principal_home" "$principal_tmp" "$source_root"
          sudo --non-interactive chmod -R go-w "$GITHUB_WORKSPACE"
          sudo --non-interactive chown -R --no-dereference "$principal_uid:$principal_gid" \
            "$GITHUB_WORKSPACE/.clawsweeper-repair" "$CODEX_HOME"
          sudo --non-interactive chmod -R u+rwX,go-rwx \
            "$GITHUB_WORKSPACE/.clawsweeper-repair" "$CODEX_HOME"
          sudo --non-interactive chmod o+x "$HOME" "$HOME/.clawsweeper-repair"
          sudo --non-interactive chmod -R a+rX,go-w "$HOME/.clawsweeper-repair/codex"

          pass_env=(
            GH_TOKEN
            CODEX_HOME
            CLAWSWEEPER_ALLOWED_OWNER
            CLAWSWEEPER_ALLOW_EXECUTE
            CLAWSWEEPER_ALLOW_FIX_PR
            CLAWSWEEPER_ALLOW_MERGE
            CLAWSWEEPER_HYDRATE_CLUSTER_REFS
            CLAWSWEEPER_HYDRATE_COMMENTS
            CLAWSWEEPER_MAX_COMMENTS_PER_ITEM
            CLAWSWEEPER_MAX_LINKED_REFS
            CLAWSWEEPER_MAX_REVIEW_COMMENTS_PER_PR
            CLAWSWEEPER_CODEX_TIMEOUT_MS
            CLAWSWEEPER_CODEX_REASONING_EFFORT
            CLAWSWEEPER_STEERABLE_CODEX
            CLAWSWEEPER_MODEL
            OPENCLAW_LOCAL_CHECK
            GITHUB_ACTIONS
            GITHUB_REPOSITORY
            GITHUB_RUN_ID
            GITHUB_RUN_ATTEMPT
            GITHUB_SERVER_URL
          )
          if [ -n "${CLAWSWEEPER_CODEX_THREAD_STATE:-}" ]; then
            pass_env+=(CLAWSWEEPER_CODEX_THREAD_STATE)
          fi
          helper_args=(
            --principal-uid "$principal_uid"
            --principal-gid "$principal_gid"
            --stage-owner-uid "$runner_uid"
            --stage-owner-gid "$runner_gid"
            --cwd "$GITHUB_WORKSPACE"
            --home "$principal_home"
            --tmp-dir "$principal_tmp"
            --path "$PATH"
            --source-root "$source_root"
            --stage-root "$stage_root"
            --file result.json:16777216
            --file cluster-plan.json:16777216
            --timeout-ms 4200000
          )
          for name in "${pass_env[@]}"; do
            helper_args+=(--pass-env "$name")
          done
          preserve_env="$(IFS=,; echo "${pass_env[*]}")"
          sudo --non-interactive --preserve-env="$preserve_env" \
            "$node_real" "$GITHUB_WORKSPACE/dist/repair/trusted-principal-main.js" "${helper_args[@]}" -- \
            "$node_real" "$GITHUB_WORKSPACE/dist/repair/run-worker.js" "${args[@]}"

      - name: Review staged worker result
        if: ${{ steps.stage-worker.outcome == 'success' }}
        env:
          STAGED_ROOT: ${{ runner.temp }}/clawsweeper-worker-stage
        run: pnpm run repair:review-results -- "$STAGED_ROOT"

      - name: Seal immutable source in reviewed worker artifacts
        if: ${{ steps.stage-worker.outcome == 'success' }}
        env:
          STAGED_ROOT: ${{ runner.temp }}/clawsweeper-worker-stage
          JOB_PATH: ${{ inputs.job }}
          STATE_REVISION: ${{ steps.immutable-job.outputs.state_revision }}
          JOB_SHA256: ${{ steps.immutable-job.outputs.job_sha256 }}
        run: |
          set -euo pipefail
          source_root=".clawsweeper-repair/immutable-state"
          source_path="$source_root/$JOB_PATH"
          actual_revision="$(git -C "$source_root" rev-parse HEAD)"
          if [ "$actual_revision" != "$STATE_REVISION" ]; then
            echo "Immutable state revision mismatch while sealing reviewed artifacts: expected $STATE_REVISION, got $actual_revision." >&2
            exit 1
          fi
          actual_sha256="$(sha256sum "$source_path" | cut -d' ' -f1)"
          if [ "$actual_sha256" != "$JOB_SHA256" ]; then
            echo "Immutable job SHA-256 mismatch while sealing reviewed artifacts: expected $JOB_SHA256, got $actual_sha256." >&2
            exit 1
          fi
          for required in result.json cluster-plan.json; do
            candidate="$STAGED_ROOT/$required"
            if [ ! -f "$candidate" ] || [ -L "$candidate" ]; then
              echo "Reviewed worker artifacts are missing regular $required." >&2
              exit 1
            fi
          done
          for sealed in source-job.md source-job.json; do
            if [ -e "$STAGED_ROOT/$sealed" ] || [ -L "$STAGED_ROOT/$sealed" ]; then
              echo "Reviewed worker artifacts unexpectedly contain $sealed before sealing." >&2
              exit 1
            fi
          done
          cp "$source_path" "$STAGED_ROOT/source-job.md"
          SOURCE_IDENTITY_PATH="$STAGED_ROOT/source-job.json" node --input-type=module <<'NODE'
          import fs from "node:fs";

          fs.writeFileSync(
            process.env.SOURCE_IDENTITY_PATH,
            `${JSON.stringify(
              {
                job_sha256: process.env.JOB_SHA256,
                schema_version: 1,
                source_job: process.env.JOB_PATH,
                state_revision: process.env.STATE_REVISION,
              },
              null,
              2,
            )}\n`,
          );
          NODE

      - name: Upload worker transfer artifacts
        if: ${{ success() && steps.stage-worker.outcome == 'success' && (steps.recovery_inputs.outputs.effective_mode == 'execute' || steps.recovery_inputs.outputs.effective_mode == 'autonomous') && !inputs.dry_run }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-worker-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/clawsweeper-worker-stage/result.json
            ${{ runner.temp }}/clawsweeper-worker-stage/cluster-plan.json
            ${{ runner.temp }}/clawsweeper-worker-stage/source-job.md
            ${{ runner.temp }}/clawsweeper-worker-stage/source-job.json
          if-no-files-found: error

      - name: Upload final worker artifacts
        if: ${{ success() && steps.stage-worker.outcome == 'success' && !((steps.recovery_inputs.outputs.effective_mode == 'execute' || steps.recovery_inputs.outputs.effective_mode == 'autonomous') && !inputs.dry_run) }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/clawsweeper-worker-stage/result.json
            ${{ runner.temp }}/clawsweeper-worker-stage/cluster-plan.json
            ${{ runner.temp }}/clawsweeper-worker-stage/source-job.md
            ${{ runner.temp }}/clawsweeper-worker-stage/source-job.json
          if-no-files-found: error

      - name: Record planning completion
        if: ${{ success() && steps.lifecycle_session.outcome == 'success' }}
        env:
          EFFECTIVE_MODE: ${{ steps.recovery_inputs.outputs.effective_mode }}
        run: |
          if [[ "$EFFECTIVE_MODE" == "plan" || "$DRY_RUN" == "true" ]]; then
            pnpm run repair:action-session -- update \
              --state completed \
              --phase "done" \
              --summary "Planning and deterministic review completed" \
              --completion-reason plan_complete
          else
            pnpm run repair:action-session -- update \
              --state running \
              --phase planned \
              --summary "Planning completed; execution runner starting"
          fi

      - name: Record planning failure
        if: ${{ failure() && steps.lifecycle_session.outcome == 'success' }}
        continue-on-error: true
        run: pnpm run repair:action-session -- update --state blocked --phase planning_failed --summary "Planning Action failed" --completion-reason action_failed

      - name: Finalize cluster repair action ledger
        id: finalize-cluster-action-ledger
        if: ${{ always() && steps.cluster-action-ledger.outcome == 'success' && steps.cluster-setup-pnpm.outcome == 'success' }}
        run: |
          set -euo pipefail
          output_root="${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          allow_empty_args=()
          allow_empty=false
          if [ "${{ steps.check_job.outputs.job_exists }}" != "1" ] ||
             [ "${{ steps.self_heal_head.outputs.matched }}" = "false" ]; then
            allow_empty=true
            allow_empty_args+=(--allow-empty)
          fi
          pnpm run --silent repair:action-ledger -- finalize \
            --repair-lane cluster \
            "${allow_empty_args[@]}" \
            > "$output_root/repair-action-ledger-manifest.json"
          echo "allow_empty=$allow_empty" >> "$GITHUB_OUTPUT"

      - name: Upload cluster repair action ledger
        if: ${{ always() && steps.cluster-action-ledger.outcome == 'success' && steps.cluster-setup-pnpm.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-worker-action-ledger-cluster-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.cluster-action-ledger.outputs.output-root }}/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90

  execute:
    name: Prepare reviewed cluster actions without write credentials
    needs: cluster
    if: ${{ needs.cluster.result == 'success' && needs.cluster.outputs.job_exists == '1' && (needs.cluster.outputs.effective_mode == 'execute' || needs.cluster.outputs.effective_mode == 'autonomous') && !inputs.dry_run }}
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 75
    permissions:
      actions: read
      contents: read
    outputs:
      prepared_artifact_id: ${{ steps.upload-prepared.outputs.artifact-id }}
      prepared_artifact_digest: ${{ steps.upload-prepared.outputs.artifact-digest }}
      worker_artifact_id: ${{ steps.worker-transfer-artifact.outputs.artifact_id }}
    env:
      JOB_PATH: ${{ inputs.job }}
      CLAWSWEEPER_ALLOWED_OWNER: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || 'openclaw' }}
      CLAWSWEEPER_ALLOW_EXECUTE: ${{ needs.cluster.outputs.allow_execute == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_FIX_PR: ${{ needs.cluster.outputs.allow_fix_pr == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_MERGE: ${{ needs.cluster.outputs.allow_merge || '0' }}
      CLAWSWEEPER_CODEX_REASONING_EFFORT: ${{ vars.CLAWSWEEPER_CODEX_REASONING_EFFORT || 'high' }}
      CLAWSWEEPER_CODEX_REVIEW_ATTEMPTS: ${{ vars.CLAWSWEEPER_CODEX_REVIEW_ATTEMPTS || '4' }}
      CLAWSWEEPER_FIX_CODEX_TIMEOUT_MS: ${{ vars.CLAWSWEEPER_FIX_CODEX_TIMEOUT_MS || '1800000' }}
      CLAWSWEEPER_FIX_STEP_TIMEOUT_MS: ${{ vars.CLAWSWEEPER_FIX_STEP_TIMEOUT_MS || '4200000' }}
      CLAWSWEEPER_FIX_TIMEOUT_RESERVE_MS: ${{ vars.CLAWSWEEPER_FIX_TIMEOUT_RESERVE_MS || '1800000' }}
      CLAWSWEEPER_RESOLVE_REVIEW_THREADS: ${{ vars.CLAWSWEEPER_RESOLVE_REVIEW_THREADS || '1' }}
      CLAWSWEEPER_TARGET_VALIDATION_MODE: ${{ vars.CLAWSWEEPER_TARGET_VALIDATION_MODE || 'changed-only' }}
      CLAWSWEEPER_POST_FLIGHT_IGNORE_CHECKS: ${{ vars.CLAWSWEEPER_POST_FLIGHT_IGNORE_CHECKS || 'auto-response,Labeler,Stale' }}
      CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA: ${{ vars.CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA || '50' }}
      CLAWSWEEPER_CLOSE_SUPERSEDED_SOURCE_PRS: ${{ vars.CLAWSWEEPER_CLOSE_SUPERSEDED_SOURCE_PRS || '1' }}
      CLAWSWEEPER_GIT_USER_NAME: ${{ vars.CLAWSWEEPER_GIT_USER_NAME || 'clawsweeper[bot]' }}
      CLAWSWEEPER_GIT_USER_EMAIL: ${{ vars.CLAWSWEEPER_GIT_USER_EMAIL || '274271284+clawsweeper[bot]@users.noreply.github.com' }}
      CLAWSWEEPER_STEERABLE_CODEX: ${{ vars.CLAWSWEEPER_STEERABLE_CODEX || '0' }}
      CLAWSWEEPER_CRABFLEET_URL: ${{ vars.CLAWSWEEPER_CRABFLEET_URL || 'https://crabfleet.openclaw.ai' }}
      OPENCLAW_LOCAL_CHECK: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none
          persist-credentials: false

      - uses: ./.github/actions/setup-action-ledger
        id: execute-action-ledger

      - name: Resolve target owner
        id: target
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          case "$JOB_PATH" in
            jobs/*/*) ;;
            *)
              echo "Invalid job path: $JOB_PATH" >&2
              exit 1
              ;;
          esac
          owner="${JOB_PATH#jobs/}"
          owner="${owner%%/*}"
          if ! printf '%s' "$owner" | grep -Eq '^[A-Za-z0-9_.-]+$'; then
            echo "Invalid target owner: $owner" >&2
            exit 1
          fi
          echo "target_owner=$owner" >> "$GITHUB_OUTPUT"

      - name: Create read-only state token
        id: state-read-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: clawsweeper-state
          permission-contents: read

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.state-read-token.outputs.token }}
          fetch-depth: 1
          sparse-checkout: jobs
          persist-credentials: false

      - name: Checkout immutable execution job
        uses: actions/checkout@v7
        with:
          repository: openclaw/clawsweeper-state
          ref: ${{ needs.cluster.outputs.state_revision }}
          path: .clawsweeper-repair/immutable-state
          token: ${{ steps.state-read-token.outputs.token }}
          fetch-depth: 1
          sparse-checkout: ${{ inputs.job }}
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Check job file
        id: check_job
        env:
          JOB_PATH: ${{ inputs.job }}
          STATE_REVISION: ${{ needs.cluster.outputs.state_revision }}
          JOB_SHA256: ${{ needs.cluster.outputs.job_sha256 }}
        run: |
          set -euo pipefail
          source_path=".clawsweeper-repair/immutable-state/$JOB_PATH"
          actual_revision="$(git -C .clawsweeper-repair/immutable-state rev-parse HEAD)"
          if [ "$actual_revision" != "$STATE_REVISION" ]; then
            echo "Immutable execution state revision mismatch: expected $STATE_REVISION, got $actual_revision." >&2
            exit 1
          fi
          if [ ! -f "$source_path" ]; then
            echo "Immutable execution job is missing at $JOB_PATH." >&2
            exit 1
          fi
          actual_sha256="$(sha256sum "$source_path" | cut -d' ' -f1)"
          if [ "$actual_sha256" != "$JOB_SHA256" ]; then
            echo "Immutable execution job SHA-256 mismatch: expected $JOB_SHA256, got $actual_sha256." >&2
            exit 1
          fi
          mkdir -p "$(dirname "$JOB_PATH")"
          cp "$source_path" "$JOB_PATH"
          echo "job_exists=1" >> "$GITHUB_OUTPUT"

      - name: Resolve run-scoped Codex session
        id: codex_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          key="$(printf '%s' "$JOB_PATH" | sha256sum | cut -d' ' -f1)"
          codex_home="$HOME/.clawsweeper-repair/codex-home/work-$key"
          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "codex_home=$codex_home" >> "$GITHUB_OUTPUT"
          echo "CLAWSWEEPER_CODEX_THREAD_STATE=$codex_home/clawsweeper-thread-state.json" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-pnpm
        id: execute-setup-pnpm
        with:
          build-script: build:repair

      - name: Resolve exact target repository
        id: target_repo
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          JOB_PATH: ${{ inputs.job }}
          EXPECTED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: |
          set -euo pipefail
          node --input-type=module - "$JOB_PATH" "$EXPECTED_OWNER" "$GITHUB_OUTPUT" <<'NODE'
          import fs from "node:fs";
          import { parseJob } from "./dist/repair/lib.js";

          const jobPath = process.argv[2];
          const expectedOwner = process.argv[3];
          const outputPath = process.argv[4];
          const repo = String(parseJob(jobPath).frontmatter.repo ?? "");
          if (!/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(repo)) {
            throw new Error(`invalid target repository in ${jobPath}`);
          }
          const [owner, name] = repo.split("/");
          if (owner !== expectedOwner) {
            throw new Error(`target owner ${owner} does not match authorized owner ${expectedOwner}`);
          }
          fs.appendFileSync(outputPath, `target_repo=${repo}\ntarget_name=${name}\n`);
          NODE

      - name: Create exact-repository read token
        id: target_read_token
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_owner }}
          repositories: ${{ steps.target_repo.outputs.target_name }}
          permission-actions: read
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read

      - name: Setup pinned Bun for target validation
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - uses: ./.github/actions/setup-codex
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAWSWEEPER_INTERNAL_MODEL: ${{ secrets.CLAWSWEEPER_MODEL }}
        with:
          cache-suffix: target-pnpm
          codex-home: ${{ steps.codex_session.outputs.codex_home }}

      - name: Resume steerable Action session
        id: crabfleet_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        env:
          CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN: ${{ secrets.CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN }}
          CLAWSWEEPER_CRABFLEET_OWNER: ${{ vars.CLAWSWEEPER_CRABFLEET_OWNER }}
        run: pnpm run repair:action-session -- register "$JOB_PATH"

      - name: Resolve latest worker transfer artifact
        id: worker-transfer-artifact
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          ARTIFACT_INVENTORY: ${{ runner.temp }}/clawsweeper-repair-worker-artifacts.json
        run: |
          set -euo pipefail
          gh api --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts?per_page=100" \
            > "$ARTIFACT_INVENTORY"
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import { selectLatestAttemptArtifact } from "./dist/repair/workflow-attempt-cohort.js";

          const pages = JSON.parse(fs.readFileSync(process.env.ARTIFACT_INVENTORY, "utf8"));
          const artifact = selectLatestAttemptArtifact(
            pages,
            `clawsweeper-repair-worker-${process.env.RUN_ID}`,
            process.env.RUN_ATTEMPT,
          );
          if (!artifact) {
            throw new Error(
              `no worker transfer artifact is available through attempt ${process.env.RUN_ATTEMPT}`,
            );
          }
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            [
              `artifact_id=${artifact.id}`,
              `artifact_name=${artifact.name}`,
              `producer_attempt=${artifact.attempt}`,
              "",
            ].join("\n"),
          );
          NODE

      - name: Download worker artifacts
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ steps.worker-transfer-artifact.outputs.artifact_id }}
          path: .clawsweeper-repair/runs
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}

      - name: Verify immutable source seal in worker artifacts
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          JOB_PATH: ${{ inputs.job }}
          STATE_REVISION: ${{ needs.cluster.outputs.state_revision }}
          JOB_SHA256: ${{ needs.cluster.outputs.job_sha256 }}
        run: |
          set -euo pipefail
          source_root=".clawsweeper-repair/immutable-state"
          source_path="$source_root/$JOB_PATH"
          actual_revision="$(git -C "$source_root" rev-parse HEAD)"
          if [ "$actual_revision" != "$STATE_REVISION" ]; then
            echo "Immutable execution state revision mismatch while sealing artifacts: expected $STATE_REVISION, got $actual_revision." >&2
            exit 1
          fi
          actual_sha256="$(sha256sum "$source_path" | cut -d' ' -f1)"
          if [ "$actual_sha256" != "$JOB_SHA256" ]; then
            echo "Immutable execution job SHA-256 mismatch while sealing artifacts: expected $JOB_SHA256, got $actual_sha256." >&2
            exit 1
          fi

          sealed_count=0
          while IFS= read -r -d '' result_path; do
            run_dir="$(dirname "$result_path")"
            for required in cluster-plan.json source-job.md source-job.json; do
              candidate="$run_dir/$required"
              if [ ! -f "$candidate" ] || [ -L "$candidate" ]; then
                echo "Downloaded worker artifacts are missing regular $required." >&2
                exit 1
              fi
            done
            if ! cmp -s "$source_path" "$run_dir/source-job.md"; then
              echo "Downloaded worker artifact source job does not match immutable state." >&2
              exit 1
            fi
            jq -e \
              --arg source_job "$JOB_PATH" \
              --arg state_revision "$STATE_REVISION" \
              --arg job_sha256 "$JOB_SHA256" '
                type == "object" and
                keys == ["job_sha256", "schema_version", "source_job", "state_revision"] and
                .schema_version == 1 and
                .source_job == $source_job and
                .state_revision == $state_revision and
                .job_sha256 == $job_sha256
              ' "$run_dir/source-job.json" >/dev/null
            sealed_count=$((sealed_count + 1))
          done < <(find .clawsweeper-repair/runs -type f -name result.json -print0)

          if [ "$sealed_count" -ne 1 ]; then
            echo "Downloaded worker artifacts must contain exactly one sealed result; found $sealed_count." >&2
            exit 1
          fi

      - name: Resolve one exact worker result
        id: execution_result
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          node --input-type=module - "$JOB_PATH" "$GITHUB_OUTPUT" <<'NODE'
          import fs from "node:fs";
          import path from "node:path";
          import { parseJob } from "./dist/repair/lib.js";

          const [jobPath, outputPath] = process.argv.slice(2);
          const job = parseJob(jobPath);
          const root = path.resolve(".clawsweeper-repair/runs");
          const matches = [];
          const visit = (directory) => {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              if (/[\r\n]/.test(entry.name)) throw new Error("worker result tree contains a newline");
              const candidate = path.join(directory, entry.name);
              if (entry.isSymbolicLink()) throw new Error("worker result tree contains a symbolic link");
              if (entry.isDirectory()) visit(candidate);
              if (!entry.isFile() || entry.name !== "result.json") continue;
              const value = JSON.parse(fs.readFileSync(candidate, "utf8"));
              if (
                value.repo === job.frontmatter.repo &&
                value.cluster_id === job.frontmatter.cluster_id &&
                value.mode === job.frontmatter.mode
              ) matches.push(candidate);
            }
          };
          visit(root);
          if (matches.length !== 1) {
            throw new Error(`expected one exact worker result, found ${matches.length}`);
          }
          fs.appendFileSync(outputPath, `result_path=${matches[0]}\n`);
          NODE

      - name: Validate job
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:validate-job -- "$JOB_PATH"

      - name: Verify self-heal head
        id: self_heal_head
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          GH_TOKEN: ${{ steps.target_read_token.outputs.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:conflict-self-heal -- --verify-job-head "$JOB_PATH"

      - name: Execute isolated fix preparation and stage exact publication
        id: execute_fix
        if: ${{ steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' && env.CLAWSWEEPER_ALLOW_FIX_PR == '1' }}
        timeout-minutes: 72
        env:
          GH_TOKEN: ${{ steps.target_read_token.outputs.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
          RESULT_PATH: ${{ steps.execution_result.outputs.result_path }}
        run: |
          set -euo pipefail
          principal="cswe${GITHUB_RUN_ID}${GITHUB_RUN_ATTEMPT}"
          sudo --non-interactive useradd --system --no-create-home --shell /usr/sbin/nologin --user-group "$principal"
          principal_uid="$(id -u "$principal")"
          principal_gid="$(id -g "$principal")"
          runner_uid="$(id -u)"
          runner_gid="$(id -g)"
          node_real="$(realpath "$(command -v node)")"
          principal_home="$RUNNER_TEMP/clawsweeper-execute-home"
          principal_tmp="$principal_home/tmp"
          source_root="$GITHUB_WORKSPACE/.clawsweeper-repair/runs"
          stage_root="$RUNNER_TEMP/clawsweeper-prepared-stage"
          test ! -e "$stage_root"
          install -d -m 0700 "$stage_root"
          sudo --non-interactive install -d -m 0700 -o "$principal_uid" -g "$principal_gid" \
            "$principal_home" "$principal_tmp"
          sudo --non-interactive mkdir -p "$source_root"
          sudo --non-interactive chmod -R go-w "$GITHUB_WORKSPACE"
          sudo --non-interactive chown -R --no-dereference "$principal_uid:$principal_gid" \
            "$GITHUB_WORKSPACE/.clawsweeper-repair" "$CODEX_HOME"
          sudo --non-interactive chmod -R u+rwX,go-rwx \
            "$GITHUB_WORKSPACE/.clawsweeper-repair" "$CODEX_HOME"
          sudo --non-interactive chmod o+x "$HOME" "$HOME/.clawsweeper-repair"
          sudo --non-interactive chmod -R a+rX,go-w "$HOME/.clawsweeper-repair/codex"

          pass_env=(
            GH_TOKEN
            CODEX_HOME
            CLAWSWEEPER_ALLOWED_OWNER
            CLAWSWEEPER_ALLOW_EXECUTE
            CLAWSWEEPER_ALLOW_FIX_PR
            CLAWSWEEPER_ALLOW_MERGE
            CLAWSWEEPER_CODEX_REASONING_EFFORT
            CLAWSWEEPER_CODEX_REVIEW_ATTEMPTS
            CLAWSWEEPER_FIX_CODEX_TIMEOUT_MS
            CLAWSWEEPER_FIX_STEP_TIMEOUT_MS
            CLAWSWEEPER_FIX_TIMEOUT_RESERVE_MS
            CLAWSWEEPER_RESOLVE_REVIEW_THREADS
            CLAWSWEEPER_TARGET_VALIDATION_MODE
            CLAWSWEEPER_POST_FLIGHT_IGNORE_CHECKS
            CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA
            CLAWSWEEPER_CLOSE_SUPERSEDED_SOURCE_PRS
            CLAWSWEEPER_GIT_USER_NAME
            CLAWSWEEPER_GIT_USER_EMAIL
            CLAWSWEEPER_STEERABLE_CODEX
            CLAWSWEEPER_MODEL
            OPENCLAW_LOCAL_CHECK
            GITHUB_ACTIONS
            GITHUB_REPOSITORY
            GITHUB_RUN_ID
            GITHUB_RUN_ATTEMPT
            GITHUB_SERVER_URL
          )
          if [ -n "${CLAWSWEEPER_CODEX_THREAD_STATE:-}" ]; then
            pass_env+=(CLAWSWEEPER_CODEX_THREAD_STATE)
          fi
          helper_args=(
            --principal-uid "$principal_uid"
            --principal-gid "$principal_gid"
            --stage-owner-uid "$runner_uid"
            --stage-owner-gid "$runner_gid"
            --cwd "$GITHUB_WORKSPACE"
            --home "$principal_home"
            --tmp-dir "$principal_tmp"
            --path "$PATH"
            --source-root "$source_root"
            --stage-root "$stage_root"
            --file prepared-publication.json:1048576
            --file prepared-publication.bundle:134217728
            --allow-empty-transfer
            --timeout-ms 4200000
          )
          for name in "${pass_env[@]}"; do
            helper_args+=(--pass-env "$name")
          done
          preserve_env="$(IFS=,; echo "${pass_env[*]}")"
          sudo --non-interactive --preserve-env="$preserve_env" \
            "$node_real" "$GITHUB_WORKSPACE/dist/repair/trusted-principal-main.js" "${helper_args[@]}" -- \
            "$node_real" "$GITHUB_WORKSPACE/dist/repair/execute-fix-artifact.js" \
            "$JOB_PATH" "$RESULT_PATH" --prepare-publication
          manifest="$stage_root/prepared-publication.json"
          bundle="$stage_root/prepared-publication.bundle"
          if [ -f "$manifest" ] && [ -f "$bundle" ]; then
            echo "has_prepared=true" >> "$GITHUB_OUTPUT"
          elif [ ! -e "$manifest" ] && [ ! -e "$bundle" ]; then
            echo "has_prepared=false" >> "$GITHUB_OUTPUT"
          else
            echo "isolated prepared transfer must contain both files or neither" >&2
            exit 1
          fi

      - name: Upload immutable prepared publication transfer
        id: upload-prepared
        if: ${{ steps.execute_fix.outputs.has_prepared == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-prepared-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/clawsweeper-prepared-stage/prepared-publication.json
            ${{ runner.temp }}/clawsweeper-prepared-stage/prepared-publication.bundle
          if-no-files-found: error
          retention-days: 1

      - name: Record preparation failure
        if: ${{ always() && failure() && steps.crabfleet_session.outcome == 'success' }}
        continue-on-error: true
        run: pnpm run repair:action-session -- update --state blocked --phase preparation_failed --summary "Repair preparation failed before immutable transfer" --completion-reason action_failed

      - name: Finalize execution repair action ledger
        id: finalize-execute-action-ledger
        if: ${{ always() && steps.execute-action-ledger.outcome == 'success' && steps.execute-setup-pnpm.outcome == 'success' }}
        run: |
          set -euo pipefail
          output_root="${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          allow_empty_args=()
          if [ "${{ steps.check_job.outputs.job_exists }}" != "1" ] ||
             [ "${{ steps.self_heal_head.outputs.matched }}" = "false" ] ||
             [ "${CLAWSWEEPER_ALLOW_EXECUTE}" != "1" ] ||
             [ "${CLAWSWEEPER_ALLOW_FIX_PR}" != "1" ]; then
            allow_empty_args+=(--allow-empty)
          fi
          pnpm run --silent repair:action-ledger -- finalize \
            --repair-lane execute \
            "${allow_empty_args[@]}" \
            > "$output_root/repair-action-ledger-manifest.json"

      - name: Upload execution repair action ledger
        if: ${{ always() && steps.execute-action-ledger.outcome == 'success' && steps.execute-setup-pnpm.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-worker-action-ledger-execute-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.execute-action-ledger.outputs.output-root }}/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Publish reviewed cluster actions
    needs:
      - cluster
      - execute
    if: ${{ always() && needs.execute.result == 'success' && needs.cluster.outputs.job_exists == '1' && (needs.cluster.outputs.effective_mode == 'execute' || needs.cluster.outputs.effective_mode == 'autonomous') && !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
    env:
      JOB_PATH: ${{ format('{0}/clawsweeper-state-ground-truth/{1}', github.workspace, inputs.job) }}
      CLAWSWEEPER_ALLOWED_OWNER: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || 'openclaw' }}
      CLAWSWEEPER_ALLOW_EXECUTE: ${{ needs.cluster.outputs.allow_execute == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_FIX_PR: ${{ needs.cluster.outputs.allow_fix_pr == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_MERGE: ${{ needs.cluster.outputs.allow_merge || '0' }}
      CLAWSWEEPER_CODEX_REASONING_EFFORT: ${{ vars.CLAWSWEEPER_CODEX_REASONING_EFFORT || 'high' }}
      CLAWSWEEPER_RESOLVE_REVIEW_THREADS: ${{ vars.CLAWSWEEPER_RESOLVE_REVIEW_THREADS || '1' }}
      CLAWSWEEPER_POST_FLIGHT_IGNORE_CHECKS: ${{ vars.CLAWSWEEPER_POST_FLIGHT_IGNORE_CHECKS || 'auto-response,Labeler,Stale' }}
      CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA: ${{ vars.CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA || '50' }}
      CLAWSWEEPER_CLOSE_SUPERSEDED_SOURCE_PRS: ${{ vars.CLAWSWEEPER_CLOSE_SUPERSEDED_SOURCE_PRS || '1' }}
      CLAWSWEEPER_GIT_USER_NAME: ${{ vars.CLAWSWEEPER_GIT_USER_NAME || 'clawsweeper[bot]' }}
      CLAWSWEEPER_GIT_USER_EMAIL: ${{ vars.CLAWSWEEPER_GIT_USER_EMAIL || '274271284+clawsweeper[bot]@users.noreply.github.com' }}
      CLAWSWEEPER_STEERABLE_CODEX: ${{ vars.CLAWSWEEPER_STEERABLE_CODEX || '0' }}
      CLAWSWEEPER_CRABFLEET_URL: ${{ vars.CLAWSWEEPER_CRABFLEET_URL || 'https://crabfleet.openclaw.ai' }}
      OPENCLAW_LOCAL_CHECK: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none
          persist-credentials: false

      - uses: ./.github/actions/setup-action-ledger
        id: publish-action-ledger

      - uses: ./.github/actions/setup-pnpm
        id: publish-setup-pnpm
        with:
          build-script: build:repair

      - name: Download immutable cluster result ground truth
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.execute.outputs.worker_artifact_id }}
          path: .clawsweeper-repair/runs
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}

      - name: Download isolated prepared publication transfer
        if: ${{ needs.execute.outputs.prepared_artifact_id != '' }}
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.execute.outputs.prepared_artifact_id }}
          path: .clawsweeper-prepared

      - name: Create read-only state ground-truth token
        id: ground-truth-state-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: clawsweeper-state
          permission-contents: read

      - name: Checkout immutable job ground truth
        uses: actions/checkout@v7
        with:
          repository: openclaw/clawsweeper-state
          ref: ${{ needs.cluster.outputs.state_revision }}
          path: clawsweeper-state-ground-truth
          token: ${{ steps.ground-truth-state-token.outputs.token }}
          sparse-checkout: ${{ inputs.job }}
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Resolve target owner
        id: target
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          case "$JOB_PATH" in
            jobs/*/*) ;;
            *) echo "Invalid job path: $JOB_PATH" >&2; exit 1 ;;
          esac
          owner="${JOB_PATH#jobs/}"
          owner="${owner%%/*}"
          printf '%s' "$owner" | grep -Eq '^[A-Za-z0-9_.-]+$'
          echo "target_owner=$owner" >> "$GITHUB_OUTPUT"

      - name: Check transferred job file
        id: check_job
        run: |
          set -euo pipefail
          test -f "$JOB_PATH"
          echo "job_exists=1" >> "$GITHUB_OUTPUT"

      - name: Resolve one immutable cluster result
        id: ground_truth
        env:
          SOURCE_JOB_PATH: ${{ inputs.job }}
          STATE_REVISION: ${{ needs.cluster.outputs.state_revision }}
          JOB_SHA256: ${{ needs.cluster.outputs.job_sha256 }}
        run: |
          set -euo pipefail
          node --input-type=module - "$JOB_PATH" "$GITHUB_OUTPUT" <<'NODE'
          import { createHash } from "node:crypto";
          import fs from "node:fs";
          import path from "node:path";
          import { parseJob } from "./dist/repair/lib.js";

          const [jobPath, outputPath] = process.argv.slice(2);
          const job = parseJob(jobPath);
          const root = path.resolve(".clawsweeper-repair/runs");
          const matches = [];
          const visit = (directory) => {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const candidate = path.join(directory, entry.name);
              if (entry.isSymbolicLink()) throw new Error("cluster result tree contains a symbolic link");
              if (entry.isDirectory()) visit(candidate);
              if (!entry.isFile() || entry.name !== "result.json") continue;
              const value = JSON.parse(fs.readFileSync(candidate, "utf8"));
              if (
                value.repo === job.frontmatter.repo &&
                value.cluster_id === job.frontmatter.cluster_id &&
                value.mode === job.frontmatter.mode
              ) matches.push(candidate);
            }
          };
          visit(root);
          if (matches.length !== 1) {
            throw new Error(`expected one exact immutable cluster result, found ${matches.length}`);
          }
          const resultPath = matches[0];
          const runDir = path.dirname(resultPath);
          for (const required of ["cluster-plan.json", "source-job.md", "source-job.json"]) {
            const candidate = path.join(runDir, required);
            if (
              !fs.existsSync(candidate) ||
              !fs.statSync(candidate).isFile() ||
              fs.lstatSync(candidate).isSymbolicLink()
            ) {
              throw new Error(`immutable cluster result is missing regular ${required}`);
            }
          }
          const sourceJobPath = path.join(runDir, "source-job.md");
          const sourceIdentityPath = path.join(runDir, "source-job.json");
          const sealedSource = fs.readFileSync(sourceJobPath);
          const immutableSource = fs.readFileSync(jobPath);
          if (!sealedSource.equals(immutableSource)) {
            throw new Error("sealed cluster source does not match immutable job ground truth");
          }
          const sourceDigest = createHash("sha256").update(sealedSource).digest("hex");
          if (sourceDigest !== process.env.JOB_SHA256) {
            throw new Error("sealed cluster source SHA-256 does not match immutable handoff");
          }
          const sourceIdentity = JSON.parse(fs.readFileSync(sourceIdentityPath, "utf8"));
          const identityKeys = Object.keys(sourceIdentity).sort();
          if (
            JSON.stringify(identityKeys) !==
              JSON.stringify(["job_sha256", "schema_version", "source_job", "state_revision"]) ||
            sourceIdentity.schema_version !== 1 ||
            sourceIdentity.source_job !== process.env.SOURCE_JOB_PATH ||
            sourceIdentity.state_revision !== process.env.STATE_REVISION ||
            sourceIdentity.job_sha256 !== process.env.JOB_SHA256
          ) {
            throw new Error("sealed cluster source identity does not match immutable handoff");
          }
          const sha256 = createHash("sha256").update(fs.readFileSync(resultPath)).digest("hex");
          fs.appendFileSync(
            outputPath,
            `result_path=${resultPath}\nrun_dir=${runDir}\nresult_sha256=${sha256}\n`,
          );
          NODE

      - name: Resolve exact target repository
        id: target_repo
        env:
          EXPECTED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: |
          set -euo pipefail
          node --input-type=module - "$JOB_PATH" "$EXPECTED_OWNER" "$GITHUB_OUTPUT" <<'NODE'
          import fs from "node:fs";
          import { parseJob } from "./dist/repair/lib.js";
          const [jobPath, expectedOwner, outputPath] = process.argv.slice(2);
          const repo = String(parseJob(jobPath).frontmatter.repo ?? "");
          if (!/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(repo)) throw new Error("invalid target repository");
          const [owner, name] = repo.split("/");
          if (owner !== expectedOwner) throw new Error("target owner does not match authorized owner");
          fs.appendFileSync(outputPath, `target_repo=${repo}\ntarget_name=${name}\n`);
          NODE

      - name: Create exact-repository read token
        id: target_read_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_owner }}
          repositories: ${{ steps.target_repo.outputs.target_name }}
          permission-actions: read
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read

      - name: Validate transferred job
        env:
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: node dist/repair/validate-job.js "$JOB_PATH"

      - name: Verify transferred self-heal head
        id: self_heal_head
        env:
          GH_TOKEN: ${{ steps.target_read_token.outputs.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: node dist/repair/conflict-self-heal.js --verify-job-head "$JOB_PATH"

      - name: Independently validate publication authority
        id: publication_validation
        if: ${{ steps.self_heal_head.outputs.matched != 'false' }}
        env:
          GH_TOKEN: ${{ steps.target_read_token.outputs.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
          PREPARED_ARTIFACT_ID: ${{ needs.execute.outputs.prepared_artifact_id }}
          RESULT_PATH: ${{ steps.ground_truth.outputs.result_path }}
        run: |
          set -euo pipefail
          if [ -n "$PREPARED_ARTIFACT_ID" ]; then
            node dist/repair/execute-fix-artifact.js "$JOB_PATH" "$RESULT_PATH" \
              --prepared-dir .clawsweeper-prepared \
              --validate-prepared-publication
            mode="prepared"
          else
            node dist/repair/execute-fix-artifact.js "$JOB_PATH" "$RESULT_PATH" \
              --validate-no-publication
            mode="no-publication"
          fi
          {
            echo "ready=true"
            echo "mode=$mode"
          } >> "$GITHUB_OUTPUT"

      - name: Create central workflow read token after validation
        id: workflow-read-token
        if: ${{ steps.publication_validation.outputs.ready == 'true' && steps.publication_validation.outputs.mode == 'no-publication' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: clawsweeper
          permission-actions: read
          permission-contents: read

      - name: Create narrow no-publication mutation token after validation
        id: target_post_flight_token
        if: ${{ steps.publication_validation.outputs.ready == 'true' && steps.publication_validation.outputs.mode == 'no-publication' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_owner }}
          repositories: ${{ steps.target_repo.outputs.target_name }}
          permission-issues: write
          permission-pull-requests: write

      - name: Resume steerable Action session for publication
        id: crabfleet_session
        if: ${{ steps.publication_validation.outputs.ready == 'true' && steps.publication_validation.outputs.mode == 'no-publication' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        env:
          CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN: ${{ secrets.CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN }}
          CLAWSWEEPER_CRABFLEET_OWNER: ${{ vars.CLAWSWEEPER_CRABFLEET_OWNER }}
        run: node dist/repair/action-session.js register "$JOB_PATH" --skip-repair-receipt

      - name: Publish automatic implementation build status
        if: ${{ steps.publication_validation.outputs.ready == 'true' && steps.publication_validation.outputs.mode == 'no-publication' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' && env.CLAWSWEEPER_ALLOW_FIX_PR == '1' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
          CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
        run: |
          node dist/repair/issue-implementation-status.js \
            --job "$JOB_PATH" \
            --state "Building" \
            --detail "Codex finished editing, validation, and review; the isolated publisher is applying the exact reviewed commit." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Publish independently validated outcome
        id: publish_outcome
        if: ${{ steps.publication_validation.outputs.ready == 'true' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' }}
        env:
          TARGET_MUTATION_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
          RESULT_PATH: ${{ steps.ground_truth.outputs.result_path }}
        run: |
          set -euo pipefail
          if [ "${{ steps.publication_validation.outputs.mode }}" = "prepared" ]; then
            test "$CLAWSWEEPER_ALLOW_FIX_PR" = "1"
            env -u GH_TOKEN -u GITHUB_TOKEN -u TARGET_MUTATION_TOKEN \
              node dist/repair/execute-fix-artifact.js "$JOB_PATH" "$RESULT_PATH" \
              --prepared-dir .clawsweeper-prepared \
              --publish-prepared-publication
          else
            test -n "$TARGET_MUTATION_TOKEN"
            GH_TOKEN="$TARGET_MUTATION_TOKEN" \
              node dist/repair/execute-fix-artifact.js "$JOB_PATH" "$RESULT_PATH" \
              --publish-no-publication
          fi

      - name: Upload immutable deferred publication receipt
        if: ${{ steps.publication_validation.outputs.mode == 'prepared' && steps.publish_outcome.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-deferred-publication-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.JOB_PATH }}
            ${{ steps.ground_truth.outputs.result_path }}
            ${{ steps.ground_truth.outputs.run_dir }}/cluster-plan.json
            .clawsweeper-prepared/prepared-publication-validation.json
            .clawsweeper-prepared/prepared-publication.json
            .clawsweeper-prepared/prepared-publication.bundle
            ${{ steps.ground_truth.outputs.run_dir }}/fix-execution-report.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 30

      - name: Bind authenticated mutation App identity
        id: mutation_app
        if: ${{ always() && steps.publication_validation.outputs.mode == 'no-publication' && steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_MERGE == '1' && steps.target_post_flight_token.outcome == 'success' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
          APP_SLUG: ${{ steps.target_post_flight_token.outputs.app-slug }}
          EXPECTED_APP_SLUG: ${{ env.CLAWSWEEPER_APP_SLUG }}
        run: |
          set -euo pipefail
          if [ -z "$APP_SLUG" ] || [ "$APP_SLUG" != "$EXPECTED_APP_SLUG" ]; then
            echo "Authenticated mutation App slug is missing or unexpected: ${APP_SLUG:-<empty>}." >&2
            exit 1
          fi
          app_id="$(gh api "apps/$APP_SLUG" --jq '.id')"
          if ! printf '%s' "$app_id" | grep -Eq '^[1-9][0-9]*$'; then
            echo "Authenticated mutation App ID is invalid: ${app_id:-<empty>}." >&2
            exit 1
          fi
          echo "app_id=$app_id" >> "$GITHUB_OUTPUT"
          echo "app_slug=$APP_SLUG" >> "$GITHUB_OUTPUT"

      - name: Record deterministic validation phase
        if: ${{ success() && steps.publication_validation.outputs.mode == 'no-publication' && steps.crabfleet_session.outcome == 'success' }}
        run: node dist/repair/action-session.js update --state running --phase post_flight --summary "Codex changes validated; applying GitHub post-flight gates"

      - name: Apply safe closure actions
        if: ${{ steps.publication_validation.outputs.mode == 'no-publication' && steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' }}
        env:
          GH_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
          CLAWSWEEPER_WORKFLOW_GH_TOKEN: ${{ steps.workflow-read-token.outputs.token }}
          CLAWSWEEPER_AUTHENTICATED_APP_ID: ${{ steps.mutation_app.outputs.app_id }}
          CLAWSWEEPER_AUTHENTICATED_APP_SLUG: ${{ steps.mutation_app.outputs.app_slug }}
          CLAWSWEEPER_AUTHENTICATED_INSTALLATION_ID: ${{ steps.target_post_flight_token.outputs.installation-id }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
          RESULT_PATH: ${{ steps.ground_truth.outputs.result_path }}
        run: node dist/repair/apply-result.js "$JOB_PATH" "$RESULT_PATH"

      - name: Post-flight finalize fix PRs
        id: post_flight
        if: ${{ steps.publication_validation.outputs.mode == 'no-publication' && steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' && env.CLAWSWEEPER_ALLOW_FIX_PR == '1' }}
        env:
          GH_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
          CLAWSWEEPER_WORKFLOW_GH_TOKEN: ${{ steps.workflow-read-token.outputs.token }}
          CLAWSWEEPER_AUTHENTICATED_APP_ID: ${{ steps.mutation_app.outputs.app_id }}
          CLAWSWEEPER_AUTHENTICATED_APP_SLUG: ${{ steps.mutation_app.outputs.app_slug }}
          CLAWSWEEPER_AUTHENTICATED_INSTALLATION_ID: ${{ steps.target_post_flight_token.outputs.installation-id }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
          RESULT_PATH: ${{ steps.ground_truth.outputs.result_path }}
        run: node dist/repair/post-flight.js "$JOB_PATH" "$RESULT_PATH"

      - name: Apply post-flight closeouts
        if: ${{ steps.publication_validation.outputs.mode == 'no-publication' && steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' }}
        env:
          GH_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
          CLAWSWEEPER_WORKFLOW_GH_TOKEN: ${{ steps.workflow-read-token.outputs.token }}
          CLAWSWEEPER_AUTHENTICATED_APP_ID: ${{ steps.mutation_app.outputs.app_id }}
          CLAWSWEEPER_AUTHENTICATED_APP_SLUG: ${{ steps.mutation_app.outputs.app_slug }}
          CLAWSWEEPER_AUTHENTICATED_INSTALLATION_ID: ${{ steps.target_post_flight_token.outputs.installation-id }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
          RESULT_PATH: ${{ steps.ground_truth.outputs.result_path }}
        run: node dist/repair/apply-result.js "$JOB_PATH" "$RESULT_PATH"

      - name: Publish automatic implementation completion status
        if: ${{ always() && steps.publication_validation.outputs.ready == 'true' && steps.publication_validation.outputs.mode == 'no-publication' && steps.check_job.outputs.job_exists == '1' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
          CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
          EXECUTE_OUTCOME: ${{ steps.publish_outcome.outcome }}
          POST_FLIGHT_OUTCOME: ${{ steps.post_flight.outcome }}
          RESULT_PATH: ${{ steps.ground_truth.outputs.result_path }}
        run: |
          set -euo pipefail
          state="Blocked"
          detail="The automatic implementation worker stopped before all deterministic gates completed. Open the workflow run for the exact blocker."
          pr_url=""
          report=""
          post_flight_report=""
          if [ "$EXECUTE_OUTCOME" = "success" ]; then
            report="${RESULT_PATH%/*}/fix-execution-report.json"
            if [ -f "$report" ]; then
              pr_url="$(
                jq -r '
                  [
                    .actions[]?
                    | select(
                        .action == "open_fix_pr" and
                        (.status | IN("opened", "executed", "updated")) and
                        ((.pr_url // "") != "")
                      )
                    | .pr_url
                  ][-1] // empty
                ' "$report"
              )"
            else
              report=""
            fi
          fi
          if [ "$EXECUTE_OUTCOME" = "success" ] && [ "$POST_FLIGHT_OUTCOME" = "success" ] && [ -n "$report" ]; then
            post_flight_report="${report%/*}/post-flight-report.json"
            if [ ! -f "$post_flight_report" ]; then
              post_flight_report=""
            fi
            if [ -n "$pr_url" ]; then
              state="PR Opened"
              detail="The implementation PR is open. Normal pull request checks and maintainer review continue on $pr_url."
              post_flight_ready="false"
              if [ -n "$post_flight_report" ]; then
                post_flight_ready="$(
                  jq -r --arg pr_url "$pr_url" '
                    any(
                      .actions[]?;
                      .action == "finalize_fix_pr" and
                      .source_action == "open_fix_pr" and
                      .status == "ready" and
                      ((.target // "") == $pr_url)
                    )
                  ' "$post_flight_report"
                )"
              fi
              if [ "$post_flight_ready" = "true" ]; then
                detail="The implementation PR passed the worker's edit, validation, review, publish, and post-flight gates."
              else
                reason="$(
                  jq -r '
                    [
                      .actions[]?
                      | select(.status | IN("blocked", "failed", "skipped"))
                      | .reason
                      | select(type == "string" and length > 0)
                    ][-1] // empty
                  ' "$post_flight_report" 2>/dev/null || true
                )"
                if [ -z "$reason" ]; then
                  reason="$(
                    jq -r '
                      [
                        .actions[]?
                        | select(.status | IN("blocked", "failed", "skipped"))
                        | .reason
                        | select(type == "string" and length > 0)
                      ][-1] // .reason // empty
                    ' "$report"
                  )"
                fi
                if [ -n "$reason" ]; then
                  detail="The implementation PR is open. Post-flight status: $reason"
                fi
              fi
            fi
          fi
          node dist/repair/issue-implementation-status.js \
            --job "$JOB_PATH" \
            --state "$state" \
            --detail "$detail" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --pr-url "$pr_url"

      - name: Record work completion
        if: ${{ success() && steps.crabfleet_session.outcome == 'success' }}
        run: node dist/repair/action-session.js update --state completed --phase "done" --summary "Validated GitHub actions and post-flight gates completed" --completion-reason gates_passed

      - name: Upload final publication artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .clawsweeper-repair/runs/**
          if-no-files-found: warn
          include-hidden-files: true

      - name: Record work failure
        if: ${{ always() && failure() && steps.crabfleet_session.outcome == 'success' }}
        continue-on-error: true
        run: node dist/repair/action-session.js update --state blocked --phase action_failed --summary "Repair Action failed before all completion gates passed" --completion-reason action_failed

      - name: Finalize publication repair action ledger
        id: finalize-publish-action-ledger
        if: ${{ always() && steps.publish-action-ledger.outcome == 'success' && steps.publish-setup-pnpm.outcome == 'success' }}
        run: |
          set -euo pipefail
          output_root="${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          node dist/repair/action-ledger-cli.js finalize \
            --repair-lane publish \
            --allow-empty \
            > "$output_root/repair-action-ledger-manifest.json"

      - name: Upload publication repair action ledger
        if: ${{ always() && steps.publish-action-ledger.outcome == 'success' && steps.publish-setup-pnpm.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-worker-action-ledger-publish-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.publish-action-ledger.outputs.output-root }}/**
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90
