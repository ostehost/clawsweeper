name: repair commit finding intake

run-name: ${{ (github.event.inputs.dispatch_key || github.event.client_payload.dispatch_key) && format('Commit finding {0}@{1} [{2}]', github.event.inputs.target_repo || github.event.client_payload.target_repo || 'openclaw/openclaw', github.event.inputs.commit_sha || github.event.client_payload.commit_sha || '?', github.event.inputs.dispatch_key || github.event.client_payload.dispatch_key) || format('Commit finding {0}@{1}', github.event.inputs.target_repo || github.event.client_payload.target_repo || 'openclaw/openclaw', github.event.inputs.commit_sha || github.event.client_payload.commit_sha || '?') }}

on:
  repository_dispatch:
    types: [clawsweeper_commit_finding]
  workflow_dispatch:
    inputs:
      enabled:
        description: "Run commit finding intake"
        required: false
        default: "true"
        type: string
      target_repo:
        description: "Target repository"
        required: true
        default: "openclaw/openclaw"
        type: string
      commit_sha:
        description: "Commit SHA with a ClawSweeper finding"
        required: true
        type: string
      dispatch_key:
        description: "Stable commit finding dispatch idempotency key"
        required: false
        default: ""
        type: string
      payload_version:
        description: "Dispatch payload contract; new producers send 2"
        required: false
        default: ""
        type: string
      report_repo:
        description: "Repository containing the ClawSweeper report"
        required: false
        default: "openclaw/clawsweeper-state"
        type: string
      report_path:
        description: "Path to the ClawSweeper report"
        required: false
        default: ""
        type: string
      report_revision:
        description: "Immutable commit SHA containing the ClawSweeper report"
        required: false
        default: ""
        type: string
      report_sha256:
        description: "SHA-256 of the exact ClawSweeper report bytes"
        required: false
        default: ""
        type: string
      report_url:
        description: "Public report URL"
        required: false
        default: ""
        type: string
      runner:
        description: "Deprecated compatibility value; intake uses a fixed trusted runner"
        required: false
        default: blacksmith-16vcpu-ubuntu-2404
        type: string

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093
  CLAWSWEEPER_ALLOWED_OWNER: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || 'openclaw' }}
  CLAWSWEEPER_ALLOW_EXECUTE: ${{ vars.CLAWSWEEPER_ALLOW_EXECUTE == '1' && '1' || '0' }}
  CLAWSWEEPER_ALLOW_FIX_PR: ${{ vars.CLAWSWEEPER_ALLOW_FIX_PR == '1' && '1' || '0' }}
  CLAWSWEEPER_ALLOW_MERGE: "0"
  CLAWSWEEPER_CODEX_REASONING_EFFORT: ${{ vars.CLAWSWEEPER_CODEX_REASONING_EFFORT || 'high' }}
  CLAWSWEEPER_CODEX_REVIEW_ATTEMPTS: ${{ vars.CLAWSWEEPER_CODEX_REVIEW_ATTEMPTS || '4' }}
  CLAWSWEEPER_FIX_CODEX_TIMEOUT_MS: ${{ vars.CLAWSWEEPER_FIX_CODEX_TIMEOUT_MS || '1200000' }}
  CLAWSWEEPER_FIX_STEP_TIMEOUT_MS: "2400000"
  CLAWSWEEPER_FIX_TIMEOUT_RESERVE_MS: ${{ vars.CLAWSWEEPER_FIX_TIMEOUT_RESERVE_MS || '300000' }}
  CLAWSWEEPER_MODEL: internal
  CLAWSWEEPER_TARGET_VALIDATION_MODE: ${{ vars.CLAWSWEEPER_TARGET_VALIDATION_MODE || 'changed-only' }}
  CLAWSWEEPER_RESOLVE_REVIEW_THREADS: ${{ vars.CLAWSWEEPER_RESOLVE_REVIEW_THREADS || '1' }}
  CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA: ${{ vars.CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA || '50' }}
  CLAWSWEEPER_GIT_USER_NAME: ${{ vars.CLAWSWEEPER_GIT_USER_NAME || 'clawsweeper[bot]' }}
  CLAWSWEEPER_GIT_USER_EMAIL: ${{ vars.CLAWSWEEPER_GIT_USER_EMAIL || '274271284+clawsweeper[bot]@users.noreply.github.com' }}

concurrency:
  group: commit-finding-${{ github.event.inputs.target_repo || github.event.client_payload.target_repo || 'openclaw/openclaw' }}-${{ github.event.inputs.commit_sha || github.event.client_payload.commit_sha || github.run_id }}
  cancel-in-progress: false

jobs:
  receipt:
    name: Deduplicate commit finding dispatch receipt
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      proceed: ${{ steps.receipt.outputs.proceed }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: scripts/dispatch-receipt-owner.sh
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - id: receipt
        env:
          DISPATCH_KEY: ${{ github.event.inputs.dispatch_key || github.event.client_payload.dispatch_key || '' }}
          TARGET_REPO: ${{ github.event.inputs.target_repo || github.event.client_payload.target_repo || 'openclaw/openclaw' }}
          COMMIT_SHA: ${{ github.event.inputs.commit_sha || github.event.client_payload.commit_sha || '?' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$DISPATCH_KEY" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          expected_title="Commit finding ${TARGET_REPO}@${COMMIT_SHA} [${DISPATCH_KEY}]"
          owner="$(bash scripts/dispatch-receipt-owner.sh \
            repair-commit-finding-intake.yml "$expected_title" "$GITHUB_RUN_ID" \
            "Intake commit finding" "Complete commit finding dispatch receipt")"
          if [ "$owner" = "owner" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "An older active or durably published commit finding dispatch already exists; skipping duplicate intake."
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

  disabled-target:
    name: Skip disabled target commit finding
    needs: receipt
    if: ${{ needs.receipt.outputs.proceed == 'true' && github.event_name == 'repository_dispatch' && github.event.client_payload.target_repo == 'openclaw/clawhub' && vars.CLAWSWEEPER_ENABLE_CLAWHUB != '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Explain skipped commit finding
        env:
          TARGET_REPO: ${{ github.event.client_payload.target_repo }}
        run: |
          echo "Skipping commit finding repair for $TARGET_REPO."
          echo "Set CLAWSWEEPER_ENABLE_CLAWHUB=1 after installing the ClawSweeper GitHub App on openclaw/clawhub."

  intake:
    name: Intake commit finding
    needs: receipt
    if: ${{ needs.receipt.outputs.proceed == 'true' && !(github.event_name == 'repository_dispatch' && github.event.client_payload.target_repo == 'openclaw/clawhub' && vars.CLAWSWEEPER_ENABLE_CLAWHUB != '1') }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm
        id: setup-pnpm
        with:
          build-script: build:repair

      - name: Validate bounded commit finding source
        id: source
        env:
          ALLOWED_OWNER: ${{ env.CLAWSWEEPER_ALLOWED_OWNER }}
          TARGET_REPO: ${{ github.event.inputs.target_repo || github.event.client_payload.target_repo || 'openclaw/openclaw' }}
          COMMIT_SHA: ${{ github.event.inputs.commit_sha || github.event.client_payload.commit_sha }}
          REPORT_REPO: ${{ github.event.inputs.report_repo || github.event.client_payload.report_repo || 'openclaw/clawsweeper-state' }}
          REPORT_PATH: ${{ github.event.inputs.report_path || github.event.client_payload.report_path }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const targetRepo = String(process.env.TARGET_REPO || "").trim();
          const reportRepo = String(process.env.REPORT_REPO || "").trim();
          const sha = String(process.env.COMMIT_SHA || "").trim().toLowerCase();
          const allowedOwner = String(process.env.ALLOWED_OWNER || "").trim();
          const repoPattern = /^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/;
          if (!repoPattern.test(targetRepo) || targetRepo.split("/")[0] !== allowedOwner) {
            throw new Error("target repository is outside the allowed owner");
          }
          if (reportRepo !== "openclaw/clawsweeper-state") {
            throw new Error("commit finding reports must come from the ClawSweeper state repository");
          }
          if (!/^[0-9a-f]{40}$/.test(sha)) throw new Error("commit SHA must be 40 hexadecimal characters");
          const targetSlug = targetRepo.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
          const expectedPath = `records/${targetSlug}/commits/${sha}.md`;
          const reportPath = String(process.env.REPORT_PATH || expectedPath).trim();
          if (reportPath !== expectedPath) {
            throw new Error("commit finding report path does not match the canonical target/commit path");
          }
          const [, targetName] = targetRepo.split("/");
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            [
              `target_repo=${targetRepo}`,
              `target_repo_name=${targetName}`,
              `commit_sha=${sha}`,
              `report_repo=${reportRepo}`,
              `report_path=${reportPath}`,
            ].join("\n") + "\n",
          );
          NODE

      - uses: ./.github/actions/setup-action-ledger
        id: intake-action-ledger

      - name: Create read-only target token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ env.CLAWSWEEPER_ALLOWED_OWNER }}
          repositories: |
            ${{ steps.source.outputs.target_repo_name }}
            clawsweeper
            clawsweeper-state
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read
          permission-actions: read

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}
          fetch-depth: 1

      - name: Resolve commit finding report handoff
        id: report-handoff
        env:
          PAYLOAD_VERSION: ${{ github.event.inputs.payload_version || github.event.client_payload.payload_version || '' }}
          TARGET_REPO: ${{ steps.source.outputs.target_repo }}
          COMMIT_SHA: ${{ steps.source.outputs.commit_sha }}
          REPORT_REPO: ${{ steps.source.outputs.report_repo }}
          REPORT_PATH: ${{ steps.source.outputs.report_path }}
          REPORT_REVISION: ${{ github.event.inputs.report_revision || github.event.client_payload.report_revision }}
          REPORT_SHA256: ${{ github.event.inputs.report_sha256 || github.event.client_payload.report_sha256 }}
          REPORT_URL: ${{ github.event.inputs.report_url || github.event.client_payload.report_url }}
        run: |
          set -euo pipefail
          payload_version="${PAYLOAD_VERSION:-1}"
          case "$payload_version" in
            1|2) ;;
            *)
              echo "Unsupported commit finding payload version: $payload_version" >&2
              exit 1
              ;;
          esac
          if ! printf '%s' "$TARGET_REPO" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
            echo "Invalid commit finding target repository: $TARGET_REPO" >&2
            exit 1
          fi
          target_repo="$(printf '%s' "$TARGET_REPO" | tr '[:upper:]' '[:lower:]')"
          if ! printf '%s' "$COMMIT_SHA" | grep -Eq '^[a-f0-9]{40}$'; then
            echo "Invalid commit finding commit SHA: $COMMIT_SHA" >&2
            exit 1
          fi
          expected_report_path="records/${target_repo//\//-}/commits/${COMMIT_SHA}.md"
          report_path="${REPORT_PATH:-$expected_report_path}"
          if [ "$report_path" != "$expected_report_path" ]; then
            echo "Commit finding report path must be $expected_report_path" >&2
            exit 1
          fi
          if { [ -n "$REPORT_REVISION" ] && [ -z "$REPORT_SHA256" ]; } ||
             { [ -z "$REPORT_REVISION" ] && [ -n "$REPORT_SHA256" ]; }; then
            echo "report_revision and report_sha256 must be provided together." >&2
            exit 1
          fi
          if [ "$payload_version" = "2" ] &&
             { [ -z "$REPORT_REVISION" ] || [ -z "$REPORT_SHA256" ]; }; then
            echo "commit finding payload version 2 requires report_revision and report_sha256." >&2
            exit 1
          fi

          report_repo="$REPORT_REPO"
          report_revision="$REPORT_REVISION"
          report_sha256="$REPORT_SHA256"
          report_url="$REPORT_URL"
          processable=true
          legacy_unsealed=false
          if [ -n "$report_revision" ]; then
            if [ "$report_repo" != "openclaw/clawsweeper-state" ]; then
              echo "Immutable commit finding reports must use openclaw/clawsweeper-state." >&2
              exit 1
            fi
            if ! printf '%s' "$report_revision" | grep -Eq '^[a-f0-9]{40}$'; then
              echo "Invalid commit finding report revision: $report_revision" >&2
              exit 1
            fi
            if ! printf '%s' "$report_sha256" | grep -Eq '^[a-f0-9]{64}$'; then
              echo "Invalid commit finding report SHA-256: $report_sha256" >&2
              exit 1
            fi
          else
            legacy_unsealed=true
            processable=false
            report_repo="openclaw/clawsweeper-state"
            report_url=""
            echo "::warning title=Legacy commit finding skipped::The dispatch has no immutable report identity; recording a non-repair audit."
          fi
          {
            echo "payload_version=$payload_version"
            echo "processable=$processable"
            echo "legacy_unsealed=$legacy_unsealed"
            echo "target_repo=$target_repo"
            echo "report_repo=$report_repo"
            echo "report_path=$report_path"
            echo "report_revision=$report_revision"
            echo "report_sha256=$report_sha256"
            echo "report_url=$report_url"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare commit finding intake
        id: prepare
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          ENABLED: ${{ github.event.inputs.enabled || github.event.client_payload.enabled || vars.CLAWSWEEPER_COMMIT_FINDING_INTAKE_ENABLED || 'true' }}
          TARGET_REPO: ${{ steps.report-handoff.outputs.target_repo }}
          COMMIT_SHA: ${{ steps.source.outputs.commit_sha }}
          REPORT_PROCESSABLE: ${{ steps.report-handoff.outputs.processable }}
          REPORT_REPO: ${{ steps.report-handoff.outputs.report_repo }}
          REPORT_PATH: ${{ steps.report-handoff.outputs.report_path }}
          REPORT_REVISION: ${{ steps.report-handoff.outputs.report_revision }}
          REPORT_SHA256: ${{ steps.report-handoff.outputs.report_sha256 }}
          REPORT_URL: ${{ steps.report-handoff.outputs.report_url }}
        run: |
          set -euo pipefail
          if [ "$REPORT_PROCESSABLE" != "true" ]; then
            node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const targetRepo = process.env.TARGET_REPO;
          const sha = process.env.COMMIT_SHA;
          const auditPath = path.join(
            "results",
            "commit-findings",
            targetRepo.replace("/", "-"),
            `${sha}.md`,
          );
          const body = `---
          repo: ${targetRepo}
          sha: ${sha}
          report_repo: ${process.env.REPORT_REPO}
          report_path: ${process.env.REPORT_PATH}
          report_revision: unavailable
          report_sha256: unavailable
          decision: legacy_report_unsealed
          prepared_at: ${new Date().toISOString()}
          ---

          # Commit Finding ${sha.slice(0, 12)}

          - Decision: \`legacy_report_unsealed\`
          - Reason: delayed legacy dispatch had no immutable report identity
          - Job: none
          - Run dir: none
          `;
          fs.mkdirSync(path.dirname(auditPath), { recursive: true });
          fs.writeFileSync(
            auditPath,
            `${body
              .split("\n")
              .map((line) => line.replace(/^          /, ""))
              .join("\n")
              .trim()}\n`,
          );
          const outputs = {
            status: "legacy_report_unsealed",
            should_repair: "false",
            reason:
              "delayed legacy dispatch had no immutable report identity",
            audit_path: auditPath,
            job_path: "",
            run_dir: "",
          };
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `${Object.entries(outputs)
              .map(([key, value]) => `${key}=${value}`)
              .join("\n")}\n`,
          );
          NODE
            exit 0
          fi
          : "${REPORT_REVISION:?resolved report_revision is required}"
          : "${REPORT_SHA256:?resolved report_sha256 is required}"
          args=(
            prepare
            --enabled "$ENABLED"
            --target-repo "$TARGET_REPO"
            --commit-sha "$COMMIT_SHA"
            --report-repo "$REPORT_REPO"
            --report-revision "$REPORT_REVISION"
            --report-sha256 "$REPORT_SHA256"
          )
          if [ -n "${REPORT_PATH:-}" ]; then
            args+=(--report-path "$REPORT_PATH")
          fi
          if [ -n "${REPORT_URL:-}" ]; then
            args+=(--report-url "$REPORT_URL")
          fi
          pnpm run repair:commit-finding-intake -- "${args[@]}"

      - name: Review synthetic result
        if: ${{ steps.prepare.outputs.should_repair == 'true' }}
        run: pnpm run repair:review-results -- "${{ steps.prepare.outputs.result_path }}"

      - name: Publish local result ledger
        if: ${{ always() && steps.prepare.outputs.should_repair == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          pnpm run repair:publish-result -- "${{ steps.prepare.outputs.run_dir }}" \
            --skip-dashboard \
            --run-id "${{ github.run_id }}" \
            --run-url "$RUN_URL" \
            --head-sha "${{ github.sha }}" \
            --conclusion "success"

      - name: Finalize commit finding audit
        if: ${{ always() && steps.report-handoff.outputs.processable == 'true' }}
        run: |
          if [ -n "${{ steps.prepare.outputs.audit_path }}" ]; then
            pnpm run repair:commit-finding-intake -- finalize \
              --audit-path "${{ steps.prepare.outputs.audit_path }}" \
              --run-dir "${{ steps.prepare.outputs.run_dir }}" \
              --status "${{ steps.prepare.outputs.should_repair == 'true' && 'queued' || steps.prepare.outputs.status }}"
          fi

      - name: Commit intake ledger
        id: publish-intake
        if: always()
        run: |
          set -euo pipefail
          pnpm run repair:publish-main -- \
            --message "chore: record commit finding intake" \
            --path jobs \
            --path results \
            --restore repair-apply-report.json \
            --receipt-kind commit_finding_intake_state \
            --max-attempts 12 \
            --push-attempts 4

      - name: Bind immutable published job
        id: published-job
        if: ${{ steps.prepare.outputs.should_repair == 'true' && steps.publish-intake.outcome == 'success' }}
        env:
          JOB_PATH: ${{ steps.prepare.outputs.job_path }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$JOB_PATH" | grep -Eq '^jobs/[A-Za-z0-9_.-]+/inbox/[A-Za-z0-9_.-]+\.md$'; then
            echo "Invalid commit finding job path: $JOB_PATH" >&2
            exit 1
          fi
          state_revision="$(git -C "$CLAWSWEEPER_STATE_DIR" rev-parse HEAD)"
          if ! printf '%s' "$state_revision" | grep -Eq '^[a-f0-9]{40}$'; then
            echo "Invalid published state revision: $state_revision" >&2
            exit 1
          fi
          immutable_job="$RUNNER_TEMP/commit-finding-job.md"
          git -C "$CLAWSWEEPER_STATE_DIR" show "${state_revision}:${JOB_PATH}" > "$immutable_job"
          job_sha256="$(sha256sum "$immutable_job" | cut -d' ' -f1)"
          if ! printf '%s' "$job_sha256" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "Invalid published job SHA-256: $job_sha256" >&2
            exit 1
          fi
          mkdir -p "$(dirname "$JOB_PATH")"
          cp "$immutable_job" "$JOB_PATH"
          {
            echo "state_revision=$state_revision"
            echo "job_sha256=$job_sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Create central worker dispatch token
        id: dispatch-token
        if: ${{ steps.prepare.outputs.should_repair == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: clawsweeper
          permission-actions: write
          permission-contents: read

      - name: Dispatch isolated repair worker
        if: ${{ steps.prepare.outputs.should_repair == 'true' && steps.published-job.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ steps.dispatch-token.outputs.token }}
          JOB_PATH: ${{ steps.prepare.outputs.job_path }}
          STATE_REVISION: ${{ steps.published-job.outputs.state_revision }}
          JOB_SHA256: ${{ steps.published-job.outputs.job_sha256 }}
        run: |
          set -euo pipefail
          pnpm run repair:dispatch -- "$JOB_PATH" \
            --mode autonomous \
            --wait-for-capacity \
            --runner blacksmith-4vcpu-ubuntu-2404 \
            --execution-runner blacksmith-16vcpu-ubuntu-2404 \
            --state-revision "$STATE_REVISION" \
            --job-sha256 "$JOB_SHA256" \
            --model internal \
            --ref main

      - name: Finalize commit finding intake action ledger
        if: ${{ always() && steps.setup-pnpm.outcome == 'success' && steps.intake-action-ledger.outcome == 'success' }}
        run: |
          set -euo pipefail
          : "${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          mkdir -p .artifacts
          pnpm run --silent repair:action-ledger -- finalize \
            --repair-lane commit-finding-intake \
            > .artifacts/commit-finding-intake-action-ledger-manifest.json

      - name: Publish immutable commit finding intake action ledger
        if: ${{ always() && steps.setup-pnpm.outcome == 'success' && steps.intake-action-ledger.outcome == 'success' }}
        run: |
          set -euo pipefail
          test -n "${CLAWSWEEPER_STATE_DIR:-}"
          source_root="${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          manifest_file=".artifacts/commit-finding-intake-action-ledger-manifest.json"
          event_paths_file=".artifacts/commit-finding-intake-action-ledger-paths.txt"
          import_result_file=".artifacts/commit-finding-intake-action-ledger-import.json"
          test -s "$manifest_file"
          pnpm run --silent repair:action-ledger -- publish \
            --repair-lane commit-finding-intake \
            --manifest "$manifest_file" \
            --source-root "$source_root" \
            --state-root "$CLAWSWEEPER_STATE_DIR" > "$import_result_file"
          jq -e --slurpfile manifest "$manifest_file" \
            '.eventPaths == $manifest[0].event_paths' \
            "$import_result_file" >/dev/null
          jq -r '.paths[]?' "$import_result_file" | sort -u > "$event_paths_file"
          if [ ! -s "$event_paths_file" ]; then
            echo "Commit finding intake action event shards existed but no paths were imported." >&2
            exit 1
          fi
          action_ledger_args=()
          while IFS= read -r event_path; do
            durable_event_path="$CLAWSWEEPER_STATE_DIR/$event_path"
            test -f "$durable_event_path"
            mkdir -p "$(dirname "$event_path")"
            cp "$durable_event_path" "$event_path"
            action_ledger_args+=(--path "$event_path")
          done < "$event_paths_file"
          pnpm run repair:publish-main -- \
            --message "chore: append commit finding intake action ledger" \
            "${action_ledger_args[@]}" \
            --rebase-strategy normal

      - name: Complete commit finding dispatch receipt
        if: ${{ success() && (github.event.inputs.dispatch_key || github.event.client_payload.dispatch_key) }}
        run: echo "Commit finding intake is durably published."
